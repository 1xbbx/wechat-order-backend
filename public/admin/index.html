<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - 点单系统</title>
  <link rel="stylesheet" href="/admin/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

  <!-- ===== 登录页 ===== -->
  <div id="loginView" class="login-view">
    <div class="login-card">
      <div class="login-logo">🍽️</div>
      <h1>点单系统后台</h1>
      <p class="login-sub">请输入管理密码</p>
      <input type="password" id="pwdInput" placeholder="管理密码" autocomplete="off">
      <button id="loginBtn" onclick="doLogin()">登 录</button>
      <p id="loginErr" class="login-err"></p>
    </div>
  </div>

  <!-- ===== 主框架 ===== -->
  <div id="mainView" class="main-view hidden">

    <!-- 左侧导航栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon">🍽️</span>
        <span class="brand-name" id="brandName">点单系统</span>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard', this)">
          <span class="nav-icon">📊</span><span class="nav-text">首页</span>
        </div>

        <div class="nav-group">
          <div class="nav-group-title">业务管理</div>
          <div class="nav-item" data-page="orders" onclick="navigate('orders', this)">
            <span class="nav-icon">📋</span><span class="nav-text">订单管理</span>
            <span class="nav-badge" id="orderBadge"></span>
          </div>
          <div class="nav-item" data-page="products" onclick="navigate('products', this)">
            <span class="nav-icon">🍜</span><span class="nav-text">商品管理</span>
          </div>
          <div class="nav-item" data-page="categories" onclick="navigate('categories', this)">
            <span class="nav-icon">📂</span><span class="nav-text">分类管理</span>
          </div>
          <div class="nav-item" data-page="tables" onclick="navigate('tables', this)">
            <span class="nav-icon">🪑</span><span class="nav-text">桌台管理</span>
          </div>
        </div>

        <div class="nav-group">
          <div class="nav-group-title">数据中心</div>
          <div class="nav-item" data-page="analytics" onclick="navigate('analytics', this)">
            <span class="nav-icon">📈</span><span class="nav-text">数据统计</span>
          </div>
          <div class="nav-item" data-page="finance" onclick="navigate('finance', this)">
            <span class="nav-icon">💰</span><span class="nav-text">财务管理</span>
          </div>
        </div>

        <div class="nav-group">
          <div class="nav-group-title">系统</div>
          <div class="nav-item" data-page="store" onclick="navigate('store', this)">
            <span class="nav-icon">🏪</span><span class="nav-text">店铺设置</span>
          </div>
          <div class="nav-item" data-page="settings" onclick="navigate('settings', this)">
            <span class="nav-icon">⚙️</span><span class="nav-text">系统设置</span>
          </div>
        </div>
      </nav>

      <div class="sidebar-footer">
        <button class="logout-btn" onclick="doLogout()">退出登录</button>
      </div>
    </aside>

    <!-- 右侧内容区 -->
    <div class="content-area">
      <!-- 顶部栏 -->
      <header class="topbar">
        <h2 class="page-title" id="pageTitle">首页</h2>
        <div class="topbar-right">
          <span class="topbar-time" id="topbarTime"></span>
          <span class="topbar-user">👤 管理员</span>
        </div>
      </header>

      <!-- 页面内容容器 -->
      <main class="page-content" id="pageContent">
        <!-- 由 JS 动态渲染 -->
      </main>
    </div>
  </div>

  <!-- ===== 通用弹窗 ===== -->
  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal-panel" id="modalPanel">
      <div class="modal-header">
        <h3 id="modalTitle">弹窗</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-content" id="modalContent"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <!-- 提示音（新订单） -->
  <audio id="alertSound" preload="auto" src="data:audio/wav;base64,UklGRl9vT19teleXhwZWN0teleUAAAA"></audio>

  <script src="/admin/app.js"></script>
  <script src="/admin/pages/dashboard.js"></script>
  <script src="/admin/pages/orders.js"></script>
  <script src="/admin/pages/products.js"></script>
  <script src="/admin/pages/others.js"></script>
</body>
</html>
